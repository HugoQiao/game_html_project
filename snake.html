<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贪吃蛇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #1a1a2e; font-family: 'Segoe UI', sans-serif;
  }
  .container { text-align: center; }
  .header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px; padding: 0 4px;
  }
  .score-box {
    background: #16213e; color: #e94560; padding: 8px 20px;
    border-radius: 8px; font-size: 18px; font-weight: bold;
  }
  .score-box span { color: #fff; }
  .best-box {
    background: #16213e; color: #f0a500; padding: 8px 20px;
    border-radius: 8px; font-size: 18px; font-weight: bold;
  }
  .best-box span { color: #fff; }
  canvas {
    border: 2px solid #0f3460; border-radius: 4px;
    background: #16213e; display: block;
  }
  .controls {
    margin-top: 12px; color: #aaa; font-size: 14px;
  }
  .game-over-msg {
    color: #e94560; font-size: 16px; margin-top: 8px; min-height: 24px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="score-box">分数 <span id="score">0</span></div>
    <div class="best-box">最高记录 <span id="best">0</span></div>
  </div>
  <canvas id="canvas" width="400" height="400"></canvas>
  <div class="game-over-msg" id="msg"></div>
  <div class="controls">方向键 / WASD 控制方向 &nbsp;|&nbsp; 空格键 重新开始</div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const msgEl = document.getElementById('msg');

const GRID = 20;
const COLS = canvas.width / GRID;
const ROWS = canvas.height / GRID;

let snake, food, dir, nextDir, score, gameOver, timer;

const STORAGE_KEY = 'snake_best_score';
let bestScore = parseInt(localStorage.getItem(STORAGE_KEY)) || 0;
bestEl.textContent = bestScore;

function init() {
  snake = [{ x: Math.floor(COLS / 2), y: Math.floor(ROWS / 2) }];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  gameOver = false;
  scoreEl.textContent = '0';
  msgEl.textContent = '';
  placeFood();
}

function placeFood() {
  const occupied = new Set(snake.map(s => `${s.x},${s.y}`));
  if (occupied.size >= COLS * ROWS) return;
  let pos;
  do {
    pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
  } while (occupied.has(`${pos.x},${pos.y}`));
  food = pos;
}

function update() {
  dir = { ...nextDir };
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return endGame();
  if (snake.some(s => s.x === head.x && s.y === head.y)) return endGame();

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score++;
    scoreEl.textContent = score;
    placeFood();
  } else {
    snake.pop();
  }
}

function endGame() {
  gameOver = true;
  clearInterval(timer);
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem(STORAGE_KEY, bestScore);
    bestEl.textContent = bestScore;
    msgEl.textContent = '新纪录！按空格键重新开始';
  } else {
    msgEl.textContent = '游戏结束！按空格键重新开始';
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // food
  ctx.fillStyle = '#e94560';
  ctx.fillRect(food.x * GRID + 1, food.y * GRID + 1, GRID - 2, GRID - 2);

  // snake
  snake.forEach((s, i) => {
    ctx.fillStyle = i === 0 ? '#0f9b8e' : '#16c79a';
    ctx.fillRect(s.x * GRID + 1, s.y * GRID + 1, GRID - 2, GRID - 2);
  });
}

function gameLoop() {
  if (gameOver) return;
  update();
  draw();
}

function restart() {
  clearInterval(timer);
  init();
  timer = setInterval(gameLoop, 120);
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    restart();
    return;
  }
  if (gameOver) return;
  switch (e.code) {
    case 'ArrowUp':    case 'KeyW': if (dir.y !==  1) nextDir = { x:  0, y: -1 }; break;
    case 'ArrowDown':  case 'KeyS': if (dir.y !== -1) nextDir = { x:  0, y:  1 }; break;
    case 'ArrowLeft':  case 'KeyA': if (dir.x !==  1) nextDir = { x: -1, y:  0 }; break;
    case 'ArrowRight': case 'KeyD': if (dir.x !== -1) nextDir = { x:  1, y:  0 }; break;
  }
});

init();
timer = setInterval(gameLoop, 120);
</script>
</body>
</html>
